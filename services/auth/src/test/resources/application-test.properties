spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
spring.liquibase.parameters.admin.password.hash=
spring.liquibase.drop-first=true

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

app.security.jwt.secret=my-super-secret-key-32-symbols-minimum-length
app.security.jwt.access-token-lifetime=900s
app.security.jwt.refresh-token-lifetime=30d